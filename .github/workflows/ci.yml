name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # BuildKonfig reads API_KEY from local.properties at configuration time
      # and fails the build if the file is absent.
      - name: Generate local.properties
        run: echo "API_KEY=${{ secrets.API_KEY }}" > local.properties

      - name: Run tests and coverage
        run: ./gradlew testAndroidHostTest koverXmlReport koverHtmlReport

      # Single aggregated coverage report for all modules (open html/index.html)
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/**

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
